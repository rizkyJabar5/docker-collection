services:
  redis:
    image: redis:latest
    container_name: redis
    command: redis-server --save 20 1 --loglevel warning --requirepass password
    ports:
      - '6379:6379'
    restart: always
    networks:
      - db.net
    volumes:
      - '.cache/redis:/data:Z'
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 1s
      timeout: 1s
      retries: 3

networks:
  db.net:
    name: db-network
    external: true
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"
